version: "3.9"

services:
  # ── 关系型数据库 ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cdss_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdss}
      POSTGRES_USER: ${POSTGRES_USER:-cdss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdss123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdss}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 全文检索 ──────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: cdss_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 缓存 / 消息队列 ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cdss_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 对象存储（指南PDF等文件）─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cdss_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── 后端 API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdss_backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cdss}:${POSTGRES_PASSWORD:-cdss123}@postgres:5432/${POSTGRES_DB:-cdss}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - ES_URL=http://elasticsearch:9200
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ─────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdss_celery
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cdss}:${POSTGRES_PASSWORD:-cdss123}@postgres:5432/${POSTGRES_DB:-cdss}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    command: celery -A tasks.celery_app worker --loglevel=info

  # ── Nginx 反向代理 ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cdss_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/pc/dist:/usr/share/nginx/html/pc:ro
      - ./frontend/his/dist:/usr/share/nginx/html/his:ro
      - ./frontend/admin/dist:/usr/share/nginx/html/admin:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
  redis_data:
  minio_data:
